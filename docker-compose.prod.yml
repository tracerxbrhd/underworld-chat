services:
  web:
    build:
      context: .
      dockerfile: infra/web/Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - backend
      - ws
    ports:
      - "127.0.0.1:${APP_HTTP_PORT}:80"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.prod
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    env_file:
      - .env.production
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio

  ws:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.prod
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8001
    env_file:
      - .env.production
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.prod
    command: celery -A config worker --loglevel=INFO
    env_file:
      - .env.production
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-prod-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${MINIO_API_PORT}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-prod-data:/data

  createbuckets:
    image: minio/mc:latest
    env_file:
      - .env.production
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        echo 'waiting for minio...';
        sleep 2;
      done &&
      mc mb --ignore-existing local/${S3_BUCKET} &&
      mc anonymous set private local/${S3_BUCKET};
      "

volumes:
  postgres-prod-data:
  redis-prod-data:
  minio-prod-data:
